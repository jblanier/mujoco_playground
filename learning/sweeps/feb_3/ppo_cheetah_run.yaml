name: ppo_cheetah_run
program: train_jax_ppo.py
method: bayes
metric:
  name: eval/episode_reward
  goal: maximize

parameters:
  wandb_project:
    value: mjxrl-sweep
  env_name:
    value: CheetahRun
  num_timesteps:
    value: 100000000

  # === PPO Parameters ===
  learning_rate:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-2
  entropy_cost:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-1
  num_minibatches:
    values: [16, 32, 64]
  num_updates_per_batch:
    values: [4, 8, 16, 32]
  clipping_epsilon:
    values: [0.05, 0.1, 0.2, 0.3]
  max_grad_norm:
    values: [0.3, 0.5, 1.0, 2.0]

command:
  - ${env}
  - python
  - ${program}
  - ${args}
  - --use_wandb
